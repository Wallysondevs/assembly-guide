kind = "web"
previewPath = "/"
title = "Assembly - Livro Completo"
version = "1.0.0"
id = "artifacts/assembly-guide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18419

[services.development]
run = "pnpm --filter @workspace/assembly-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/assembly-guide", "run", "build" ]
publicDir = "artifacts/assembly-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18419"
BASE_PATH = "/"
